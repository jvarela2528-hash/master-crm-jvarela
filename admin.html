<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER CRM HQ | Control Global & IA</title>
    <link rel="stylesheet" href="/src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ... (Mantenemos tus estilos existentes iguales) ... */
        .login-overlay { display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; }
        .admin-wrapper { display: none; /* Oculto por defecto hasta autenticar */ }
    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div style="background:#161616; padding:2.5rem; border-radius:24px; border:1px solid #222; text-align:center; width:100%; max-width:380px; box-shadow:0 20px 50px rgba(0,0,0,0.8);">
            <h2 style="color:#d4af37; margin-bottom:0.5rem; font-size:1.8rem; font-weight:800;">MASTER CRM HQ</h2>
            <p style="color:#666; font-size:0.85rem; margin-bottom:2rem;">Acceso Protegido vía Firebase Auth</p>
            
            <input type="email" id="admin-email" placeholder="Correo electrónico" style="width:100%; padding:1rem; background:#000; border:1px solid #333; border-radius:12px; color:#fff; margin-bottom:1rem; outline:none; text-align:center;">
            <input type="password" id="admin-pass" placeholder="Contraseña Master" style="width:100%; padding:1rem; background:#000; border:1px solid #333; border-radius:12px; color:#fff; margin-bottom:1.5rem; outline:none; text-align:center;">
            
            <button id="login-btn" style="width:100%; padding:1rem; background:linear-gradient(135deg, #d4af37, #f9e29c); color:#000; border:none; border-radius:12px; font-weight:800; cursor:pointer; text-transform:uppercase;">Entrar al Master</button>
        </div>
    </div>

    <header class="mobile-header">
        <h3 style="color:#d4af37; font-size:1.1rem; font-weight:800; margin:0;">MASTER CRM HQ</h3>
        <button class="menu-toggle" id="menu-toggle-btn">☰</button>
    </header>

    <div class="admin-wrapper" id="admin-panel">
        <aside class="sidebar">
            <h3 style="color:#d4af37; margin-bottom:2.5rem; padding-left:1rem; font-size:1.4rem; font-weight:800;">MASTER CRM HQ</h3>
            <nav style="flex:1;">
                <div class="nav-item active" data-section="leads-section">📊 Prospectos</div>
                <div class="nav-item" data-section="stats-section">📈 Estadísticas en Vivo</div>
                <div class="nav-item" data-section="marketing-section">📣 Creativos IA</div>
                <div class="nav-item" data-section="docs-section">📄 Facturas & Contratos</div>
                <div class="nav-item" data-section="clients-section">👥 Clientes & Permisos</div>
                <div class="nav-item" data-section="archive-section">📂 Archivo Creativos</div>
                <div class="nav-item" data-section="doc-archive-section">🗂️ Archivo Documentos</div>
                <div class="nav-item" data-section="qr-section">🔲 QR Landing Page</div>
                <div class="nav-item" data-section="cards-section">🪪 Tarjetas Digitales Pro</div>
            </nav>
            <button id="logout-btn" class="btn-mini" style="margin-top:auto; padding:1rem; justify-content:center; font-weight:700;">Cerrar Sesión</button>
        </aside>

        <main class="main-content">
            </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
